<!DOCTYPE html>
<html lang="en" data-theme="fantasy">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="dist/style.css" rel="stylesheet" />
    <script src="main.js" defer></script>
    <title>Anaïs | Home</title>
  </head>
  <body>
    <!--drawer is just not working, i dont understand why-->
    <div class="drawer">
    <input id="my-drawer-3" type="checkbox" class="drawer-toggle" />
    <div class="drawer-content flex flex-col">
        <!-- Navbar -->
        <div class="navbar bg-base-300 w-full">
            <div class="flex-none lg:hidden">
                <label for="my-drawer-3" aria-label="open sidebar" class="btn btn-square btn-ghost">
                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    class="inline-block h-6 w-6 stroke-current"
                >
                    <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M4 6h16M4 12h16M4 18h16"
                    ></path>
                </svg>
                </label>
            </div>
            <div class="mx-2 flex-1 px-2">Navbar Title</div>
            <div class="hidden flex-none lg:block">
                <ul class="menu menu-horizontal">
                <!-- Navbar menu content here -->
                <li><a>Navbar Item 1</a></li>
                <li><a>Navbar Item 2</a></li>
                </ul>
            </div>
            </div>
            <!-- Page content here -->
            Content
        </div>
        <div class="drawer-side">
            <label for="my-drawer-3" aria-label="close sidebar" class="drawer-overlay"></label>
            <ul class="menu bg-base-200 min-h-full w-80 p-4">
            <!-- Sidebar content here -->
            <li><a>Sidebar Item 1</a></li>
            <li><a>Sidebar Item 2</a></li>
            </ul>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
        const drawerToggle = document.getElementById("my-drawer-3");
        const drawerOverlay = document.querySelector(".drawer-overlay");
        const drawerLinks = document.querySelectorAll(".drawer-side a");

        // Close drawer when any sidebar link is clicked (mobile only)
        drawerLinks.forEach(link => {
            link.addEventListener("click", () => {
            if (window.innerWidth < 1024) {
                drawerToggle.checked = false;
            }
            });
        });

        // Optional: close when overlay is clicked (already handled by label, but useful if you want more control)
        drawerOverlay.addEventListener("click", () => {
            drawerToggle.checked = false;
        });

        // Optional: expose functions to toggle manually
        window.toggleDrawer = function () {
            drawerToggle.checked = !drawerToggle.checked;
        };

        window.closeDrawer = function () {
            drawerToggle.checked = false;
        };

        window.openDrawer = function () {
            drawerToggle.checked = true;
        };
        });

    </script>
  </body>
</html>
